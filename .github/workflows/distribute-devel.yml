name: Distribute Devel to Firebase

on:
  push:
    branches: [ "dev" ] # هيشتغل لما تعمل push على dev بس

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with: 
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.22.0' # غير ده لاصدار Flutter بتاعك

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK devel
        run: flutter build apk --flavor devel --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_DEVEL }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers # غيرها لو عندك جروب تاني في Firebase
          file: build/app/outputs/flutter-apk/app-devel-release.apk
          releaseNotes: "New build from dev branch: ${{ github.event.head_commit.message }}"