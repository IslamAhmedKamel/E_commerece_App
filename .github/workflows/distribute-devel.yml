name: Distribute Devel to Firebase

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK devel
      run: flutter build apk --flavor devel --release

    - name: Upload to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: 1:696150681893:android:ec1c6189b039a0630192cc
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
        groups: testers
        file: build/app/outputs/flutter-apk/app-devel-release.apk
        releaseNotes: New build from dev branch